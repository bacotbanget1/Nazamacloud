<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSFW Random Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #f472b6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .image-box {
            width: 100%;
            height: 450px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        #displayImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        #displayImage.blurred {
            filter: blur(40px) brightness(0.6);
        }

        .blur-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .image-box:hover .blur-overlay,
        #displayImage.blurred ~ .blur-overlay {
            opacity: 1;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        #genBtn {
            background: var(--accent);
            color: white;
        }

        #genBtn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #saveBtn {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        #saveBtn:hover {
            background: rgba(255,255,255,0.15);
        }

        .log-box {
            margin-top: 20px;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #10b981;
            text-align: left;
            height: 60px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NSFW GENERATOR</h1>
    <p class="subtitle">Random Anime Image via Waifu.im API</p>

    <div class="image-box" onclick="toggleBlur()">
        <div class="loader" id="loader">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
        </div>
        <img id="displayImage" src="https://via.placeholder.com/600x800/1e293b/94a3b8?text=Ready" class="blurred">
        <div class="blur-overlay" id="overlay">
            <i class="fas fa-eye-slash fa-2x" style="margin-bottom: 10px;"></i>
            <span>Tap to Reveal</span>
        </div>
    </div>

    <div class="btn-group">
        <button id="genBtn" onclick="fetchRandomImage()">
            <i class="fas fa-dice"></i> GENERATE
        </button>
        <button id="saveBtn" onclick="downloadImg()">
            <i class="fas fa-download"></i> SAVE
        </button>
    </div>

    <div class="log-box" id="logs">> System Ready...</div>
</div>

<script>
    let currentUrl = "";

    function addLog(msg) {
        const box = document.getElementById('logs');
        box.innerHTML += `<div>> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function fetchRandomImage() {
        const btn = document.getElementById('genBtn');
        const img = document.getElementById('displayImage');
        const loader = document.getElementById('loader');

        btn.disabled = true;
        loader.style.display = "block";
        addLog("Requesting random image...");

        try {
            // Memanggil API Waifu.im untuk gambar NSFW acak
            const response = await fetch('https://api.waifu.im/search?is_nsfw=true');
            const data = await response.json();

            if (data.images && data.images.length > 0) {
                currentUrl = data.images[0].url;
                
                // Preload image
                const tempImg = new Image();
                tempImg.src = currentUrl;
                tempImg.onload = () => {
                    img.src = currentUrl;
                    img.classList.add('blurred');
                    document.getElementById('overlay').style.display = "flex";
                    loader.style.display = "none";
                    btn.disabled = false;
                    addLog("Successfully loaded.");
                };
            }
        } catch (e) {
            addLog("Error: " + e.message);
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function toggleBlur() {
        const img = document.getElementById('displayImage');
        const overlay = document.getElementById('overlay');
        if (currentUrl) {
            img.classList.toggle('blurred');
            overlay.style.display = img.classList.contains('blurred') ? "flex" : "none";
        }
    }

    function downloadImg() {
        if (!currentUrl) return alert("Generate image first!");
        window.open(currentUrl, '_blank');
        addLog("Opening image in new tab...");
    }
</script>

</body>
</html>
